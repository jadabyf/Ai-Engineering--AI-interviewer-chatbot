services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-interview-coach-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: ai-interview-coach-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
